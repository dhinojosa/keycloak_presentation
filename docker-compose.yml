services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - keycloak-postgres:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.1
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  gitea:
    image: gitea/gitea:1.22.6
    command:
      - /bin/sh
      - -c
      - |
        /etc/s6/gitea/setup
        cat >/tmp/keycloak-forward.sh <<'EOF'
        #!/bin/sh
        exec nc keycloak 8080
        EOF
        chmod +x /tmp/keycloak-forward.sh
        nc -lk -p 8080 -e /tmp/keycloak-forward.sh &
        su-exec git gitea migrate
        until wget -q -O /dev/null http://localhost:8080/realms/keycloak-demo/.well-known/openid-configuration; do
          echo "Waiting for Keycloak OIDC discovery..."
          sleep 2
        done
        AUTH_ID="$$(su-exec git gitea admin auth list | awk '/keycloak/ {print $$1; exit}')"
        if [ -n "$$AUTH_ID" ]; then
          su-exec git gitea admin auth update-oauth \
            --id "$$AUTH_ID" \
            --name keycloak \
            --provider openidConnect \
            --key gitea \
            --secret gitea-secret \
            --auto-discover-url http://localhost:8080/realms/keycloak-demo/.well-known/openid-configuration \
            --scopes openid \
            --scopes profile \
            --scopes email
        else
          su-exec git gitea admin auth add-oauth \
            --name keycloak \
            --provider openidConnect \
            --key gitea \
            --secret gitea-secret \
            --auto-discover-url http://localhost:8080/realms/keycloak-demo/.well-known/openid-configuration \
            --scopes openid \
            --scopes profile \
            --scopes email
        fi
        exec su-exec git gitea web
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__ROOT_URL: http://localhost:3000/
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: 2222
      GITEA__service__DISABLE_REGISTRATION: "false"
    depends_on:
      - keycloak
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea-data:/data

volumes:
  keycloak-postgres:
  gitea-data:
