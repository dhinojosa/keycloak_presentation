services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - keycloak-postgres:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.1
    command:
      - start-dev
      - --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    command:
      - /bin/bash
      - -c
      - |
        until curl -fsS http://keycloak:8080/realms/keycloak-demo/.well-known/openid-configuration >/dev/null; do
          echo "Waiting for Keycloak OIDC discovery..."
          sleep 2
        done
        CLUSTER_ID="LH1ZCPOqRoGKujL5_nhaHA"
        kafka-storage format --ignore-formatted --cluster-id "$$CLUSTER_ID" --config /etc/kafka/demo/server.properties
        exec kafka-server-start /etc/kafka/demo/server.properties
    depends_on:
      - keycloak
    ports:
      - "9092:9092"
      - "9101:9101"
    volumes:
      - ./kafka/server.properties:/etc/kafka/demo/server.properties:ro
      - ./kafka/client-oauth.properties:/etc/kafka/demo/client-oauth.properties:ro
      - kafka-data:/var/lib/kafka/data

volumes:
  keycloak-postgres:
  kafka-data:
