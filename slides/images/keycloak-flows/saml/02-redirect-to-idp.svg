<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc"><title id="title">Service provider redirects to Keycloak</title><desc id="desc">Stop-motion Keycloak flow diagram.</desc><defs><style>.bg{fill:#fff}.title{font:700 34px Arial,sans-serif;fill:#102a43}.small{font:20px Arial,sans-serif;fill:#334155}.note{font:700 22px Arial,sans-serif;fill:#1f4f6b}.warn{font:700 24px Arial,sans-serif;fill:#9a3412}.boxText{font:700 25px Arial,sans-serif;fill:#0f172a}.boxTextLight{font:700 25px Arial,sans-serif;fill:#fff}.actor{stroke:#334155;stroke-width:3}.browser{fill:#dbeafe}.app{fill:#5d87a1}.kc{fill:#1e3a5f}.api{fill:#e2e8f0}.service{fill:#dcfce7}.device{fill:#fef3c7}.danger{fill:#fff7ed}.arrow{stroke:#334155;stroke-width:6;fill:none;marker-end:url(#arrow)}.muted{stroke:#94a3b8;stroke-width:5;fill:none;stroke-dasharray:11 8;marker-end:url(#mutedArrow)}.bad{stroke:#b45309;stroke-width:6;fill:none;marker-end:url(#badArrow)}.token{fill:#f8fafc;stroke:#011893;stroke-width:3}.tokenTop{fill:#dbeafe}.refresh{fill:#dcfce7;stroke:#15803d;stroke-width:3}.code{fill:#fef3c7;stroke:#a16207;stroke-width:3}.xml{fill:#fff7ed;stroke:#9a3412;stroke-width:3}.key{fill:#b8c0cc;stroke:#475569;stroke-width:3}.cache{fill:#eef2ff;stroke:#4338ca;stroke-width:3}.lock{fill:#b8c0cc;stroke:#475569;stroke-width:3}.session{fill:#ecfccb;stroke:#4d7c0f;stroke-width:3}</style><marker id="arrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1L11 6L0 11Z" fill="#334155"/></marker><marker id="mutedArrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1L11 6L0 11Z" fill="#94a3b8"/></marker><marker id="badArrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1L11 6L0 11Z" fill="#b45309"/></marker></defs><rect width="1280" height="720" class="bg"/><text x=